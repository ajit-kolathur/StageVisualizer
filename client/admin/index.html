<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>StageVisualizer Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111; color: #eee;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    #app { padding: 16px; max-width: 480px; margin: 0 auto; }

    /* Auth screen */
    .auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 24px; }
    .auth-screen h1 { font-size: 1.5rem; color: #aaa; }
    .pin-form { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }
    .pin-input {
      font-size: 2rem; text-align: center; padding: 16px;
      background: #222; border: 2px solid #444; border-radius: 12px; color: #fff;
      outline: none;
    }
    .pin-input:focus { border-color: #6cf; }
    .pin-submit {
      font-size: 1.2rem; padding: 14px; border: none; border-radius: 12px;
      background: #2a6; color: #fff; cursor: pointer; font-weight: 600;
    }
    .pin-submit:active { background: #1a5; }
    .pin-error { color: #f66; text-align: center; font-size: 0.9rem; }

    /* Admin UI */
    .admin-ui h2 { font-size: 1.1rem; color: #888; margin: 12px 0 8px; }
    .status {
      text-align: center; padding: 6px; border-radius: 8px; font-size: 0.8rem; font-weight: 600;
    }
    .status.connected { background: #1a3a1a; color: #4c4; }
    .status.disconnected { background: #3a1a1a; color: #c44; }

    .plugin-list { display: flex; flex-direction: column; gap: 8px; }
    .plugin-btn {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; border: 2px solid #333; border-radius: 12px;
      background: #1a1a1a; color: #eee; font-size: 1.1rem; cursor: pointer;
      min-height: 56px;
    }
    .plugin-btn:active { background: #252525; }
    .plugin-btn.active { border-color: #6cf; background: #1a2a3a; }
    .plugin-badge {
      font-size: 0.7rem; text-transform: uppercase; padding: 3px 8px;
      border-radius: 6px; background: #333; color: #aaa; font-weight: 600;
    }

    .gain-control { margin-top: 20px; }
    .gain-control label { display: block; margin-bottom: 8px; color: #888; }
    .gain-value { color: #eee; font-weight: 600; }
    #gain-slider { width: 100%; height: 36px; accent-color: #6cf; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/client/admin/main.ts"></script>
</body>
</html>
